<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="format-detection" content="telephone=no">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="apple-touch-icon" sizes="192x192" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link href="/pages/ap/static/styles/banners.min.css" type="text/css" rel="stylesheet" />
  <title>Антиплагиат</title>
</head>

<body style="background: #f4f5f7; padding: 160px 20px 0; margin: 0 auto; max-width: 1406px;">

  <!-- banner 1 -->
  <div style="margin-bottom: 120px;">
    <div class="resultPromo">
      <img src="/pages/ap/static/images/demo-check/nice.png" srcset="/pages/ap/static/images/demo-check/nice.png 1x, /images/demo-check/nice2x.png 2x" alt="Скидка -20% на первую проверку" loading="lazy" width="370" height="270">

      <div class="resultPromo__text">Скидка <span>&minus;20%</span> на&nbsp;первую проверку</div>

      <div class="resultPromo__buttons">
        <div class="customButton customButton_green customButton_copy js-copy-promo-code" data-value="NEWBIE20" data-text="Промокод скопирован">
          NEWBIE20
          <svg width="20" height="20">
            <use href="/pages/ap/static/images/icons/sprite-demo.svg#copy"></use>
          </svg>
        </div>
        <a class="customButton customButton_main" href="https://users.antiplagiat.ru/tariffs" target="_blank" rel="nofollow">Перейти в кабинет</a>
      </div>
    </div>
  </div>
  <!-- banner 1 end -->

  <!-- banner 2 -->
  <div style="margin-bottom: 120px;">
    <div class="resultReport">
      <div class="resultReport__image">
        <picture>
          <source media="(min-width: 1260px)" srcset="/pages/ap/static/images/demo-check/report-lg.png 1x, /images/demo-check/report-lg-2x.png 2x" height="220" width="366">

          <source media="(min-width: 768px)" srcset="/pages/ap/static/images/demo-check/report-md.png 1x, /images/demo-check/report-md-2x.png 2x" height="260" width="340">

          <img src="/pages/ap/static/images/demo-check/report-sm.png" srcset="/pages/ap/static/images/demo-check/report-sm.png 1x, /images/demo-check/report-sm-2x.png 2x" alt="Разберём отчёт Антиплагиата за 1 час" loading="lazy" height="204" width="328">
        </picture>
      </div>

      <div class="resultReport__info">
        <div class="resultReport__title">Разберём отчёт Антиплагиата за&nbsp;<b>1&nbsp;час</b></div>
        <div class="resultReport__text">Поймёте результат, устраните сомнения и&nbsp;подготовите работу к&nbsp;сдаче без лишних правок</div>
      </div>

      <a class="resultReport__button customButton customButton_main" href="https://users.antiplagiat.ru/tariffs" target="_blank" rel="nofollow">Заказать разбор</a>
    </div>
  </div>
  <!-- banner 2 end -->

  <script type="text/javascript" src="/pages/ap/static/scripts/banners.min.js"></script>
</body>

</html>
